<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CESFAM N°5 — Guía de Autoconsulta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #1a6b4a;
    --verde-claro: #e6f4ee;
    --verde-medio: #2d8f63;
    --texto: #1a1a1a;
    --texto-suave: #5a5a5a;
    --borde: #dde8e3;
    --fondo: #f7faf8;
    --blanco: #ffffff;
    --radio: 16px;
    --radio-sm: 10px;
    --header-h: 130px;
    --font: 'Plus Jakarta Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--fondo); color: var(--texto); min-height: 100vh; font-size: 15px; overflow: hidden; }

  /* ── HEADER ── */
  header { background: var(--verde); color: white; position: fixed; top: 0; left: 0; right: 0; z-index: 100; box-shadow: 0 2px 14px rgba(26,107,74,0.22); }
  .header-inner { display: flex; align-items: center; gap: 14px; padding: 18px 20px 14px; max-width: 480px; margin: 0 auto; }

  /* ── LOGO: cambia src="LOGO_URL_AQUI" por la URL de tu imagen ── */
  .logo-icon {
    width: 52px; height: 52px;
    background: white;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .logo-icon img { width: 100%; height: 100%; object-fit: contain; display: block; padding: 4px; }
  .logo-icon svg { display: none; }

  .logo-text h1 { font-family: var(--font); font-size: 21px; font-weight: 600; line-height: 1.1; color: white; letter-spacing: -0.02em; }
  .logo-text p { font-size: 11px; opacity: 0.72; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 3px; font-weight: 400; }

  .tabs { display: flex; background: rgba(0,0,0,0.18); border-top: 1px solid rgba(255,255,255,0.1); }
  .tab { flex: 1; padding: 11px 8px; text-align: center; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.2s; border: none; background: transparent; position: relative; }
  .tab.active { color: white; background: rgba(255,255,255,0.12); }
  .tab.active::after { content: ''; position: absolute; bottom: 0; left: 22%; right: 22%; height: 2px; background: white; border-radius: 2px 2px 0 0; }

  .view { display: none; }
  .view.active { display: flex; flex-direction: column; }

  /* ── BUSCADOR ── */
  #view-buscar { position: fixed; top: var(--header-h); bottom: 0; left: 0; right: 0; }
  .buscar-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .buscar-inner { max-width: 480px; margin: 0 auto; padding: 16px 16px 8px; }

  .buscar-input-area { flex-shrink: 0; padding: 10px 16px max(14px, env(safe-area-inset-bottom)); background: var(--fondo); border-top: 1px solid var(--borde); }
  .buscar-input-inner { max-width: 480px; margin: 0 auto; }
  .buscar-input-row { display: flex; gap: 10px; align-items: center; background: var(--blanco); border: 1.5px solid var(--borde); border-radius: 26px; padding: 10px 14px 10px 18px; transition: border-color 0.2s; }
  .buscar-input-row:focus-within { border-color: var(--verde-medio); }
  .buscar-input-row svg { width: 18px; height: 18px; color: #9ab0a6; flex-shrink: 0; }
  .buscar-input-row input { flex: 1; border: none; outline: none; font-family: var(--font); font-size: 15px; color: var(--texto); background: transparent; }
  .buscar-input-row input::placeholder { color: #aab8b2; }
  .clear-btn { width: 24px; height: 24px; background: #dde8e3; border: none; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; color: #5a5a5a; }
  .clear-btn.visible { display: flex; }

  /* ── BIENVENIDA ── */
  .bienvenida { text-align: center; padding: 24px 16px 16px; }
  .bienvenida-icon { width: 60px; height: 60px; background: var(--verde-claro); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
  .bienvenida-icon svg { width: 30px; height: 30px; }
  .bienvenida h2 { font-size: 19px; font-weight: 600; color: var(--verde); margin-bottom: 8px; }
  .bienvenida p { font-size: 14px; color: var(--texto-suave); line-height: 1.6; max-width: 280px; margin: 0 auto 20px; }
  .chips-titulo { font-size: 11px; font-weight: 600; color: var(--texto-suave); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .chip { background: var(--blanco); border: 1px solid var(--borde); border-radius: 20px; padding: 8px 14px; font-size: 13px; font-family: var(--font); cursor: pointer; color: var(--texto); transition: all 0.15s; }
  .chip:active { background: var(--verde-claro); border-color: #b8d9cb; }

  /* ── RESULTADOS ── */
  .resultados-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .resultados-titulo { font-size: 13px; font-weight: 500; color: var(--texto-suave); }
  .resultados-count { font-size: 12px; background: var(--verde-claro); color: var(--verde); border-radius: 12px; padding: 2px 10px; font-weight: 600; }

  /* botón volver */
  .btn-volver { display: flex; align-items: center; gap: 8px; background: var(--blanco); border: 1.5px solid var(--borde); border-radius: 12px; padding: 10px 16px; margin-bottom: 14px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--texto); transition: all 0.15s; }
  .btn-volver svg { width: 16px; height: 16px; flex-shrink: 0; }
  .btn-volver:active { background: var(--verde-claro); }

  .resultado-card { background: var(--blanco); border: 1px solid var(--borde); border-radius: var(--radio); margin-bottom: 10px; overflow: hidden; animation: fadeUp 0.18s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .resultado-link { display: flex; align-items: center; padding: 14px 16px; text-decoration: none; color: var(--texto); gap: 12px; }
  .resultado-link:active { background: var(--verde-claro); }
  .resultado-icono { width: 38px; height: 38px; background: var(--verde-claro); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .resultado-icono svg { width: 18px; height: 18px; }
  .resultado-texto { flex: 1; }
  .resultado-nombre { font-size: 14px; font-weight: 600; line-height: 1.3; margin-bottom: 2px; }
  .resultado-tag { font-size: 11px; color: var(--texto-suave); }
  .resultado-match { font-size: 11px; color: var(--verde-medio); font-weight: 500; margin-top: 2px; }
  .resultado-arrow svg { width: 16px; height: 16px; color: #9ab0a6; }
  .sin-resultados { text-align: center; padding: 36px 20px; }
  .sin-resultados p { font-size: 14px; color: var(--texto-suave); line-height: 1.6; }
  .sin-resultados strong { color: var(--texto); }
  .sin-resultados .tip { margin-top: 14px; font-size: 13px; color: var(--verde); }

  /* ── ÍNDICE ── */
  #view-indice { position: fixed; top: var(--header-h); bottom: 0; left: 0; right: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .indice-inner { max-width: 480px; margin: 0 auto; padding: 16px; }

  .indice-guia {
    background: var(--verde-claro);
    border: 1px solid #b8d9cb;
    border-radius: var(--radio-sm);
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .indice-guia svg { width: 18px; height: 18px; flex-shrink: 0; color: var(--verde); }
  .indice-guia p { font-size: 13px; color: var(--verde); line-height: 1.4; font-weight: 500; }

  .letras-nav { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; justify-content: center; }
  .letra-btn {
    min-width: 42px; height: 42px;
    padding: 0 10px;
    background: var(--blanco);
    border: 1.5px solid var(--borde);
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    color: var(--verde);
    cursor: pointer;
    font-family: var(--font);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .letra-btn:active { background: var(--verde-claro); border-color: #b8d9cb; transform: scale(0.96); }
  .letra-btn.vacia { color: #c5d5ce; border-color: #e8efec; border-style: dashed; cursor: default; font-weight: 400; }

  .letra-seccion { margin-bottom: 18px; }
  .letra-titulo { font-size: 24px; font-weight: 700; color: var(--verde); margin-bottom: 8px; padding-left: 4px; scroll-margin-top: 140px; }
  .item-lista { display: flex; align-items: center; padding: 13px 14px; background: var(--blanco); border: 1px solid var(--borde); border-radius: var(--radio-sm); margin-bottom: 6px; text-decoration: none; color: var(--texto); transition: all 0.15s; }
  .item-lista:active { background: var(--verde-claro); }
  .item-lista span { flex: 1; font-size: 14px; line-height: 1.3; font-weight: 400; }
  .item-lista .arrow { width: 16px; height: 16px; color: #9ab0a6; flex-shrink: 0; }

  /* ── ESTADO ── */
  #view-estado { position: fixed; top: var(--header-h); bottom: 0; left: 0; right: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .estado-inner { max-width: 480px; margin: 0 auto; padding: 16px; }
  .estado-card { background: var(--blanco); border: 1px solid var(--borde); border-radius: var(--radio); overflow: hidden; margin-bottom: 12px; }
  .estado-card-header { padding: 13px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--borde); }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-verde { background: #2d9f6f; } .dot-rojo { background: #d94040; } .dot-amarillo { background: #e8a020; }
  .estado-card-header strong { font-size: 14px; font-weight: 600; flex: 1; }
  .estado-label { font-size: 12px; font-weight: 600; }
  .label-abierto { color: #2d9f6f; } .label-cerrado { color: #d94040; } .label-solo-hora { color: #e8a020; }
  .estado-horario { padding: 11px 16px; font-size: 13px; color: var(--texto-suave); line-height: 1.7; font-weight: 400; }
  .urgencia-banner { background: #fff3e0; border: 1px solid #f5c06a; border-radius: var(--radio); padding: 14px 16px; margin-bottom: 14px; display: flex; gap: 10px; align-items: flex-start; }
  .urgencia-banner svg { width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px; }
  .urgencia-banner strong { display: block; font-size: 13px; font-weight: 600; color: #7a4a0a; }
  .urgencia-banner p { font-size: 12px; color: #8a5c1a; margin-top: 2px; }
  .urgencia-banner a { display: inline-block; margin-top: 6px; font-size: 13px; font-weight: 600; color: var(--verde); text-decoration: none; }
  .hora-actual { text-align: center; font-size: 12px; color: var(--texto-suave); margin-bottom: 14px; font-weight: 400; }

  /* ── PÁGINAS DE CONTENIDO ── */
  #view-pagina {
    position: fixed;
    top: 0; bottom: 0; left: 0; right: 0;
    background: var(--fondo);
    z-index: 150;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: none;
    animation: slideInRight 0.22s ease;
  }
  #view-pagina.visible { display: block; }
  @keyframes slideInRight {
    from { transform: translateX(30px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  .pagina-header {
    background: var(--verde);
    position: sticky; top: 0; z-index: 10;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(26,107,74,0.18);
  }

  .pagina-back {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.18);
    border: none; border-radius: 10px;
    color: white; font-size: 13px; font-weight: 500;
    padding: 7px 12px; cursor: pointer;
    font-family: var(--font); flex-shrink: 0;
    transition: background 0.15s;
  }
  .pagina-back:active { background: rgba(255,255,255,0.28); }
  .pagina-back svg { width: 14px; height: 14px; }

  .pagina-header-titulo {
    color: rgba(255,255,255,0.75);
    font-size: 12px; font-weight: 400;
    letter-spacing: 0.03em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .pagina-body {
    max-width: 480px; margin: 0 auto;
    padding: 20px 18px 40px;
  }

  .pagina-categoria {
    display: inline-block;
    background: var(--verde-claro); color: var(--verde);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 3px 10px; border-radius: 20px;
    margin-bottom: 10px;
  }

  .pagina-titulo {
    font-size: 20px; font-weight: 700;
    color: var(--texto); line-height: 1.2;
    margin-bottom: 5px;
  }

  .pagina-fecha {
    font-size: 11px; color: #9ab0a6;
    margin-bottom: 18px;
  }

  /* Navegación por anclaje */
  .pagina-nav {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 22px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--borde);
  }

  .pagina-nav-pill {
    background: var(--fondo);
    border: 1px solid var(--borde);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px; font-weight: 500;
    color: var(--verde); cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
  }
  .pagina-nav-pill:active { background: var(--verde-claro); }

  /* Secciones de contenido */
  .pagina-seccion {
    margin-bottom: 24px;
    scroll-margin-top: 80px;
  }

  .pagina-seccion-titulo {
    font-size: 11px; font-weight: 700;
    color: var(--verde);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--verde-claro);
    margin-bottom: 12px;
  }

  .pagina-seccion-titulo-principal {
    font-size: 15px; font-weight: 700;
    color: var(--verde);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 12px 14px;
    background: linear-gradient(90deg, var(--verde-claro) 0%, rgba(230, 244, 238, 0.5) 100%);
    border-bottom: 2px solid var(--verde-claro);
    margin-bottom: 14px;
    margin-left: -16px;
    margin-right: -16px;
    padding-left: 16px;
    padding-right: 16px;
  }

  .pagina-texto {
    font-size: 15px; color: var(--texto);
    line-height: 1.7; margin-bottom: 10px;
  }

  .pagina-bullet {
    display: flex; gap: 10px;
    margin-bottom: 8px; align-items: flex-start;
  }

  .pagina-bullet-dot {
    width: 6px; height: 6px;
    background: var(--verde-medio);
    border-radius: 50%; flex-shrink: 0;
    margin-top: 8px;
  }

  .pagina-bullet span {
    font-size: 15px; color: var(--texto); line-height: 1.65;
  }

  .pagina-requisito {
    display: flex; gap: 10px;
    align-items: flex-start; margin-bottom: 8px;
  }

  .pagina-req-check {
    color: var(--verde); font-size: 15px;
    flex-shrink: 0; margin-top: 1px;
  }

  .pagina-req-texto {
    font-size: 15px; color: var(--texto); line-height: 1.6;
  }

  /* Links internos como tarjeta */
  .link-card-interno {
    display: flex; align-items: center; gap: 12px;
    background: var(--blanco); border: 1px solid var(--borde);
    border-radius: 12px; padding: 12px 14px;
    margin-bottom: 8px; cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid var(--verde-medio);
  }
  .link-card-interno:active { background: var(--verde-claro); }

  .link-card-interno-icon {
    width: 34px; height: 34px;
    background: var(--verde-claro); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .link-card-interno-icon svg { width: 16px; height: 16px; }

  .link-card-interno-texto { flex: 1; }
  .link-card-interno-nombre { font-size: 14px; font-weight: 600; color: var(--texto); }
  .link-card-interno-desc { font-size: 12px; color: var(--texto-suave); margin-top: 2px; }
  .link-card-interno-arrow svg { width: 15px; height: 15px; color: #9ab0a6; }

  /* Link inline dentro de texto */
  .link-inline-interno {
    color: var(--verde); font-weight: 600;
    text-decoration: none;
    border-bottom: 1.5px solid #b8d9cb;
    padding-bottom: 1px; cursor: pointer;
  }

  /* Link externo */
  .link-externo {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--verde); font-size: 14px; font-weight: 500;
    text-decoration: none;
    border-bottom: 1px dashed #b8d9cb; padding-bottom: 1px;
  }
  .link-externo svg { width: 12px; height: 12px; flex-shrink: 0; }

  /* Botones urgencia */
  .btn-urgencia {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 12px; border-radius: 20px;
    font-size: 13px; font-weight: 600; font-family: var(--font);
    cursor: pointer; text-decoration: none; border: none;
    transition: all 0.15s; white-space: nowrap; flex: 1;
  }
  .btn-llamar { background: #d94040 !important; color: #ffffff !important; }
  .btn-llamar svg { stroke: #ffffff !important; }
  .btn-llamar:active { background: #b83030 !important; }
  .btn-mapa { background: #1a6b4a !important; color: #ffffff !important; }
  .btn-mapa svg { stroke: #ffffff !important; }
  .btn-mapa:active { background: #155a3e !important; }

  /* Modal mapa */
  .mapa-overlay {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.55); z-index: 200;
    align-items: flex-end;
  }
  .mapa-overlay.visible { display: flex; }
  .mapa-sheet {
    background: var(--blanco); width: 100%; max-width: 480px;
    margin: 0 auto; border-radius: 20px 20px 0 0;
    overflow: hidden; height: 75vh;
    display: flex; flex-direction: column;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .mapa-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--borde);
    flex-shrink: 0;
  }
  .mapa-header strong { font-size: 15px; font-weight: 600; color: var(--texto); }
  .mapa-header p { font-size: 12px; color: var(--texto-suave); margin-top: 2px; }
  .mapa-cerrar {
    width: 30px; height: 30px; background: var(--fondo);
    border: none; border-radius: 50%; cursor: pointer;
    font-size: 16px; color: var(--texto-suave);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font);
  }
  .mapa-iframe { flex: 1; border: none; width: 100%; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-icon">
      <img src="data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
